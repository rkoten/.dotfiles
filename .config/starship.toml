"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
scan_timeout = 50  # ms

format = """
$character\
$cmd_duration\
$line_break\
$time\
$username\
$hostname\
$directory\
$python\
$jobs\
[%](bold #33FF33) \
"""

[character]
disabled = true
error_symbol = '[✘](bold #FF3333)'
success_symbol = '[✔](bold #33FF33)'

[cmd_duration]
format = "[\\($duration\\)]($style)\n"
min_time = 0  # ms
show_milliseconds = true

[directory]
format = ' [$path]($style) '
truncate_to_repo = false
truncation_length = 0
style = "bold white"

[hostname]
format = '@[$hostname]($style)'
style = 'dimmed yellow'

[jobs]
format = '[$symbol$number]($style) '
number_threshold = 1
symbol = '+'
symbol_threshold = 1

[python]
format = '[\($pyenv_prefix"$virtualenv" on py$version\)]($style) '
version_format = '$raw'

[time]
format = '[\[$time\]]($style) '
time_format = '%F %T'
disabled = true

[username]
format = '[$user]($style)'
show_always = true
style_root = "bold red"
style_user = "bold cyan"
